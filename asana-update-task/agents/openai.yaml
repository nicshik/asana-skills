interface:
  display_name: "Asana Update Task"
  short_description: "Update an Asana task via API"
  brand_color: "#F06A6A"
  default_prompt: "Use $asana-update-task as a write fallback to update one Asana task through the direct Asana REST API when the normal connector cannot apply field, tag, or section changes, prefer a numeric task gid, confirm the payload with --dry-run before writing, treat task_not_found as a target task problem rather than a missing token, and never print the access token."

policy:
  allow_implicit_invocation: false
